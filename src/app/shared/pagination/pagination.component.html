<nav aria-label="Page navigation" *ngIf="totalPages > 1" class="pagination-sticky">
  <ul class="pagination justify-content-center mb-0">
    <li class="page-item" [class.disabled]="currentPage === 1">
      <a class="page-link" (click)="goToPage(1)" aria-label="First">
        <span aria-hidden="true">&laquo;</span>
      </a>
    </li>
    <li class="page-item"
        *ngFor="let p of visiblePages"
        [class.active]="p === currentPage"
        [class.disabled]="p === -1">
      <a class="page-link" *ngIf="p !== -1" (click)="goToPage(p)">{{ p }}</a>
      <span class="page-link" *ngIf="p === -1">&hellip;</span>
    </li>
    <li class="page-item" [class.disabled]="currentPage === totalPages">
      <a class="page-link" (click)="goToPage(totalPages)" aria-label="Last">
        <span aria-hidden="true">&raquo;</span>
      </a>
    </li>
  </ul>
</nav>
