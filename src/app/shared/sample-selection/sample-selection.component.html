<!-- Header with Sample Selection Button and Clear -->
<div *ngIf="!multiSelect" class="d-flex justify-content-between align-items-center mb-3">
  <h3>{{ pageTitle }}</h3>
  <div class="text-end">
    <button class="btn btn-outline-primary me-2"
            data-bs-toggle="modal"
            [attr.data-bs-target]="'#' + modalId">
      {{ selectedSample ? 'Change Sample' : 'Select Sample' }}
    </button>
    <div class="mt-1">
      <span *ngIf="selectedSample; else noSample" class="text-muted d-flex align-items-center">
        <span class="me-2">
          <strong>{{ selectedSample.sample_ref }}</strong> - {{ selectedSample.dialect_name }}
        </span>
        <button class="btn btn-sm" (click)="clearSample()" title="Clear sample">
          <i class="bi bi-x text-muted" style="font-size: 0.8rem;"></i>
        </button>
      </span>
      <ng-template #noSample>
        <span class="text-muted">No sample selected</span>
      </ng-template>
    </div>
  </div>
</div>

<!-- Sample Selection Modal -->
<div class="modal fade" [id]="modalId" tabindex="-1" aria-labelledby="sampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header sticky-top bg-white">
        <h5 class="modal-title" id="sampleModalLabel">{{ multiSelect ? 'Choose Samples' : 'Select Sample' }}</h5>
        <button *ngIf="multiSelect" type="button" class="btn btn-secondary ms-auto" data-bs-dismiss="modal">Finished</button>
        <button *ngIf="!multiSelect" type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="p-3">
        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" role="switch" [(ngModel)]="pub" (click)="togglePub()">
          <label class="form-check-label">Include publications</label>
        </div>
        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" role="switch" [(ngModel)]="migrant" (click)="toggleMigrant()">
          <label class="form-check-label">Include migrant samples</label>
        </div>
        <div *ngIf="isGlobalAdmin" class="form-check form-switch">
          <input type="checkbox" class="form-check-input" role="switch"
                 [checked]="showHiddenSamples" [disabled]="togglingHidden"
                 (change)="toggleShowHiddenSamples($any($event.target).checked)">
          <label class="form-check-label">Include hidden samples</label>
        </div>
      </div>
      <div class="modal-body">
        <!-- Sample Search -->
        <div class="row">
          <div class="col-md-6">
            <input type="text" class="form-control mb-3" placeholder="Search samples..." [(ngModel)]="sampleSearchTerm" (input)="onSampleSearch()">
          </div>
        </div>

        <!-- Sample Results -->
        <div class="list-group" style="max-height: 400px; overflow-y: auto;">
          <!-- Multi-select: checkboxes, no dismiss -->
          <div *ngIf="multiSelect">
            <div *ngFor="let sample of filteredSamples"
                 class="list-group-item list-group-item-action d-flex align-items-center"
                 (click)="selectSample(sample)" style="cursor: pointer;">
              <input type="checkbox" class="form-check-input me-3"
                     [checked]="isSampleSelected(sample)"
                     (click)="$event.stopPropagation(); selectSample(sample)">
              <div class="flex-grow-1">
                <strong>{{ sample.sample_ref }}</strong> - {{ sample.dialect_name }}
                <span *ngIf="sample.migrant" class="badge border border-secondary text-secondary ms-2"
                  style="font-size: 0.65rem;">Migrant</span>
                <span *ngIf="sample.visible !== 'Yes'" class="badge border border-warning text-warning ms-2"
                  style="font-size: 0.65rem;">Hidden</span>
                <br>
                <small class="text-muted">{{ sample.location }}</small>
              </div>
            </div>
          </div>
          <!-- Single-select: click to pick and dismiss -->
          <ng-container *ngIf="!multiSelect">
            <button *ngFor="let sample of filteredSamples"
                    type="button"
                    class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                    (click)="selectSample(sample)"
                    data-bs-dismiss="modal">
              <div>
                <strong>{{ sample.sample_ref }}</strong> - {{ sample.dialect_name }}
                <span *ngIf="sample.migrant" class="badge border border-secondary text-secondary ms-2"
                  style="font-size: 0.65rem;">Migrant</span>
                <span *ngIf="sample.visible !== 'Yes'" class="badge border border-warning text-warning ms-2"
                  style="font-size: 0.65rem;">Hidden</span>
                <br>
                <small class="text-muted">{{ sample.location }}</small>
              </div>
            </button>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
</div>
